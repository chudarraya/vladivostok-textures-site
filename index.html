    .loader-progress{width:min(320px,80vw);height:4px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.1)}
    #progress-bar{width:0%;height:100%;background:var(--accent);transition:width .2s}
    #progress-text{font-size:14px;color:rgba(255,255,255,.7)}
    #header{position:absolute;top:32px;left:36px;z-index:20;pointer-events:none}

    #project-author{font-size:16px;opacity:.5}
    #info-panel{position:absolute;top:32px;right:36px;width:640px;padding:32px 36px;background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;z-index:25;opacity:0;transform:translateY(-16px);transition:all .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
    #info-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    #info-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.05)}
    #info-name{font-size:32px;font-weight:600;line-height:1.1}
    #info-close{font-size:28px;opacity:.5;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
    #info-close:hover{opacity:1;background:rgba(255,255,255,.08)}
    #info-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;margin-bottom:20px}
    .info-row{display:flex;flex-direction:column;gap:6px}
    .label{font-size:16px;opacity:.45;letter-spacing:.02em;text-transform:uppercase;font-weight:500}
    .value{font-size:20px;font-weight:500;line-height:1.3}
    #info-hint{font-size:16px;opacity:.35;text-align:right;margin-top:8px}
    #download-btn:hover{background:rgba(255,255,255,.2)!important;transform:translateY(-1px)}
    #controls-hint{position:absolute;bottom:28px;left:36px;color:rgba(255,255,255,.4);font-size:16px;letter-spacing:.02em;z-index:15;pointer-events:none}
    
    /* НОВЫЙ СЕЛЕКТОР КЛАСТЕРОВ */
    #cluster-selector{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:24px;background:rgba(7,7,7,.85);z-index:50;transition:opacity .4s}
    #cluster-selector.hidden{opacity:0;pointer-events:none}
    .mode-btns{display:flex;gap:16px}
    .mode-btn{padding:12px 24px;background:transparent;border:1px solid var(--border);border-radius:30px;color:#fff;font-size:16px;cursor:pointer;transition:.2s}

    .cluster-btn{padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:#fff;cursor:pointer;transition:.2s;text-align:center}
    .cluster-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
    .cluster-btn small{display:block;margin-top:4px;opacity:.5;font-size:12px}

</head>

    function normalize(str) {
      if(!str) return "РАЗНОЕ";
      let s = str.replace(/\|/g,' ').trim();
      for(let[t,f] of Object.entries(FIXES)) s = s.replace(new RegExp(t,'gi'), f);
      return s.split(',')[0].trim() || s.split(' ')[0] || "РАЗНОЕ";
    }

    RAW_DATA.forEach(d => { d.cNorm = normalize(d.c); d.dNorm = normalize(d.d); });

    // ================= THREE.JS =================
    let scene, camera, renderer, controls;
    let activeMeshes = [];
    let isLoading = false;
    const loader = new THREE.TextureLoader();
    const MAX_VISIBLE = 60; // Лимит для стабильности

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070707);
      scene.fog = new THREE.Fog(0x070707, 20, 100);
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
      camera.position.set(0, 0, 40);
      
      renderer = new THREE.WebGLRenderer({antialias:true, alpha:false, powerPreference:"high-performance"});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x070707, 1);
      document.getElementById('canvas-container').appendChild(renderer.domElement);
      
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
      controls.minDistance = 5; controls.maxDistance = 80;
      
      scene.add(new THREE.AmbientLight(0xffffff, 1.5));
      const dir = new THREE.DirectionalLight(0xffffff, 1); dir.position.set(10,15,10); scene.add(dir);
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      animate();
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

    // ================= ЗАГРУЗКА КЛАСТЕРА =================
    async function loadCluster(items) {
      if(isLoading) return;
      isLoading = true;
      disposeActive();
      document.getElementById('loader').classList.remove('hidden');
      
      const batch = items.slice(0, MAX_VISIBLE);
      const progressEl = document.getElementById('progress-bar');
      const textEl = document.getElementById('progress-text');
      let loaded = 0;

      const promises = batch.map(d => new Promise(resolve => {
        const url = `https://raw.githubusercontent.com/chudarraya/vladivostok-textures/main/1%20(${d.i}).${d.i===1?'png':'JPG'}`;
        const img = new Image(); img.crossOrigin='anonymous'; img.src=url;
        img.onload = () => resolve({data:d, img, url});
        img.onerror = () => resolve({data:d, img:null, url});
      }));

      const results = await Promise.all(promises);
      
      for(let r of results) {
        loaded++;
        const pct = Math.round((loaded/batch.length)*100);
        progressEl.style.width = pct+'%'; textEl.textContent = `${pct}% (${loaded}/${batch.length})`;
        
        const d = r.data;
        let tex;
        if(r.img) {
          tex = new THREE.Texture(r.img); tex.needsUpdate=true;
        } else {
          const cv = document.createElement('canvas'); cv.width=cv.height=128;
          const ctx = cv.getContext('2d'); ctx.fillStyle='#222'; ctx.fillRect(0,0,128,128);
          ctx.fillStyle='#555'; ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.fillText('#'+d.i,64,70);
          tex = new THREE.CanvasTexture(cv);
        }
        
        const aspect = r.img ? (r.img.width/r.img.height) : 1;
        const geo = new THREE.PlaneGeometry(aspect*1.6, 1.6);
        const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, opacity:1, side:THREE.DoubleSide});
        const mesh = new THREE.Mesh(geo, mat);
        
        mesh.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*15, (Math.random()-0.5)*25);
        mesh.userData = {...d, originalPos: mesh.position.clone()};
        scene.add(mesh); activeMeshes.push(mesh);
        
        // Небольшая задержка чтобы не блокировать поток
        await new Promise(r => setTimeout(r, 30));
      }
      
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
      isLoading = false;
    }

    function disposeActive() {
      activeMeshes.forEach(m => {
        scene.remove(m);
        m.geometry.dispose();
        if(m.material.map) m.material.map.dispose();
        m.material.dispose();
      });
      activeMeshes = [];
    }

    // ================= UI ЛОГИКА =================
    const selector = document.getElementById('cluster-selector');
    const grid = document.getElementById('cluster-grid');
    let currentMode = null;

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        renderClusterButtons();
      });
    });

    function renderClusterButtons() {
      grid.innerHTML = '';
      const key = currentMode === 'district' ? 'dNorm' : 'cNorm';
      const groups = {};
      
      RAW_DATA.forEach(d => {
        const name = d[key];
        if(!groups[name]) groups[name] = [];
        groups[name].push(d);
      });
      
      Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).forEach(([name, items]) => {
        const btn = document.createElement('button');
        btn.className = 'cluster-btn';
        btn.innerHTML = `${name}<small>${items.length} текстур${items.length>MAX_VISIBLE? ` (покажем первые ${MAX_VISIBLE})` : ''}</small>`;
        btn.addEventListener('click', () => {
          selector.classList.add('hidden');
          loadCluster(items);
        });
        grid.appendChild(btn);
      });
    }

    // Клик по 3D
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
    renderer?.domElement?.addEventListener('click', e => {
      mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(activeMeshes);
      if(hits.length) selectMesh(hits[0].object);
    });

    function selectMesh(m) {
      const panel = document.getElementById('info-panel');
      document.getElementById('val-category').textContent = m.userData.c;
      document.getElementById('val-material').textContent = m.userData.dt;
      document.getElementById('val-district').textContent = m.userData.d;
      document.getElementById('val-what').textContent = m.userData.w;
      document.getElementById('val-id').textContent = `#${String(m.userData.i).padStart(3,'0')}`;
      
      const btn = document.getElementById('download-btn');
      btn.href = `https://raw.githubusercontent.com/chudarraya/vladivostok-textures/main/1%20(${m.userData.i}).${m.userData.i===1?'png':'JPG'}`;
      btn.download = `VDK_${m.userData.i}.jpg`; btn.style.display='inline-flex';
      
      panel.classList.add('visible'); controls.autoRotate=false;
    }

    document.getElementById('info-close').addEventListener('click', () => {
      document.getElementById('info-panel').classList.remove('visible');
      document.getElementById('download-btn').style.display='none';
      controls.autoRotate=true;
    });

    window.addEventListener('keydown', e => {
      if(e.key==='Escape') document.getElementById('info-close').click();
    });

    // Запуск
    initScene();
  </script>
</body>
</html>
