    const s = CONFIG.spread;
    const isEyeLevel = Math.random() < s.eyeLevelBias;
    let x, y, z;

    if (isEyeLevel) {
        x = (Math.random() * 2 - 1) * s.horizontal;
        y = (Math.random() * 2 - 1) * (s.vertical * 0.35);
        z = (Math.random() * 2 - 1) * s.depth;
    } else {
        const isAbove = Math.random() > 0.5;
        x = (Math.random() * 2 - 1) * (s.horizontal * 0.7);
        y = (isAbove ? 1 : -1) * (s.vertical * 0.5 + Math.random() * s.vertical * 0.5);
        z = (Math.random() * 2 - 1) * (s.depth * 0.8);
    }

    // Минимальное расстояние от центра, чтобы не перекрывать камеру
    const dist = Math.sqrt(x*x + y*y + z*z);
    if (dist < 6) {
        const scale = 6 / dist;
        x *= scale; y *= scale; z *= scale;
    }

    return { x, y, z };
}

/* ===================================================== */
/*                  🖼️ СОЗДАНИЕ ОБЪЕКТОВ                */
/* ===================================================== */
function createMesh(data) {
    const geometry = new THREE.PlaneGeometry(CONFIG.textureSize, CONFIG.textureSize);
    
    textureLoader.load(
        data.url,
        (texture) => {
            // Настройка текстуры
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

            // Материал
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 1,
                side: THREE.DoubleSide
            });

            // Сетка
            const mesh = new THREE.Mesh(geometry, material);
            const pos = getImmersivePosition();
            mesh.position.set(pos.x, pos.y, pos.z);
            
            // Всегда смотрит на камеру
            mesh.lookAt(camera.position);
            mesh.rotation.z = (Math.random() - 0.5) * 0.5;

            // Данные
            mesh.userData = {
                name: data.name || `VDK_${String(data.id).padStart(2, '0')}`,
                district: data.district || "—",
                material: data.material || "—",
                whatIsIt: data.whatIsIt || "—",
                id: data.id
            };

            group.add(mesh);
            meshes.push(mesh);

            // Счётчик загрузки
            loadedCount++;
            if (loadedCount === TEXTURES.length && !isLoaderHidden) {
                hideLoader();
            }
        },
        undefined,
        (err) => {
            console.warn("Ошибка загрузки:", data.url);
            loadedCount++;
            if (loadedCount === TEXTURES.length && !isLoaderHidden) {
                hideLoader();
            }
        }
    );
}

// Запуск создания всех 48 текстур
TEXTURES.forEach(createMesh);

// Гарантированное скрытие лоадера (если сеть тормозит)
function hideLoader() {
    if (isLoaderHidden) return;
    isLoaderHidden = true;
    loader.classList.add('hidden');
}
setTimeout(hideLoader, 3000); // Через 3 секунды точно уберётся

/* ===================================================== */
/*                  🖱️ ИНТЕРАКЦИЯ                        */
/* ===================================================== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;
let selectedMesh = null;

function updateMouse(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}

function checkHover() {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(meshes);

    // Сброс ховера для невыбранных
    meshes.forEach(m => {
        if (m !== selectedMesh) {
            m.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            m.material.opacity = THREE.MathUtils.lerp(m.material.opacity, 1, 0.1);
        }
    });

    if (intersects.length > 0) {
        hoveredMesh = intersects[0].object;
        if (hoveredMesh !== selectedMesh) {
            hoveredMesh.scale.lerp(new THREE.Vector3(1.22, 1.22, 1.22), 0.15);
            app.style.cursor = 'pointer';
        }
    } else {
        hoveredMesh = null;
        app.style.cursor = 'grab';
    }
}

function showInfoPanel(data) {
    valName.textContent = data.name;
    valDistrict.textContent = data.district;
    valMaterial.textContent = data.material;
    valWhat.textContent = data.whatIsIt;
    valId.textContent = `#${String(data.id).padStart(2, '0')}`;
    infoPanel.classList.add('visible');
}

function hideInfoPanel() {
    infoPanel.classList.remove('visible');
}

function selectMesh(mesh) {
    if (selectedMesh === mesh) {
        // Отмена выбора
        selectedMesh.scale.set(1, 1, 1);
        selectedMesh.material.opacity = 1;
        selectedMesh = null;
        hideInfoPanel();
        controls.autoRotate = true;
        return;
    }
    // Сброс предыдущего
    if (selectedMesh) {
        selectedMesh.scale.set(1, 1, 1);
        selectedMesh.material.opacity = 1;
    }
    // Выбор нового
    selectedMesh = mesh;
    selectedMesh.scale.set(CONFIG.focusScale, CONFIG.focusScale, CONFIG.focusScale);
    selectedMesh.material.opacity = 1;
    
    // Затемнение остальных
    meshes.forEach(m => {
        if (m !== selectedMesh) {
            m.material.opacity = CONFIG.dimOpacity;
        }
    });
    
    showInfoPanel(mesh.userData);
    controls.autoRotate = false;
}

// События
app.addEventListener('mousemove', (e) => {
    updateMouse(e);
    checkHover();
});

app.addEventListener('click', (e) => {
    updateMouse(e);
    checkHover();
    if (hoveredMesh) {
        selectMesh(hoveredMesh);
    } else if (!selectedMesh) {
        controls.autoRotate = true;
    }
});

infoCloseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (selectedMesh) {
        selectedMesh.scale.set(1, 1, 1);
        selectedMesh.material.opacity = 1;
        selectedMesh = null;
        hideInfoPanel();
        controls.autoRotate = true;
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && selectedMesh) {
        selectedMesh.scale.set(1, 1, 1);
        selectedMesh.material.opacity = 1;
        selectedMesh = null;
        hideInfoPanel();
        controls.autoRotate = true;
    }
});

app.addEventListener('touchstart', () => { controls.autoRotate = false; }, { passive: true });
app.addEventListener('touchend', () => { setTimeout(() => controls.autoRotate = true, 2500); });

/* ===================================================== */
/*                  🔄 АНИМАЦИЯ                          */
/* ===================================================== */
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    group.rotation.y += CONFIG.rotationSpeed;

    // Лёгкое покачивание при наведении
    if (hoveredMesh && hoveredMesh !== selectedMesh) {
        hoveredMesh.rotation.z = Math.sin(Date.now() * 0.002) * 0.06;
    }

    // Все невыбранные текстуры смотрят на камеру
    meshes.forEach(m => {
        if (m !== selectedMesh) {
            m.lookAt(camera.position);
        }
    });

    renderer.render(scene, camera);
}

/* ===================================================== */
/*                  📐 RESIZE                            */
/* ===================================================== */
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Запуск
animate();
app.style.cursor = 'grab';
</script>
