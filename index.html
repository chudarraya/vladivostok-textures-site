  // Функция для создания URL. Знает, что почти все файлы JPG.
  function getTexUrl(id) {
    // ID 1 - это PNG, остальные - JPG. Это убирает 99% ошибок 404.
    const ext = (id === 1) ? 'png' : 'JPG';
    return 'https://raw.githubusercontent.com/chudarraya/vladivostok-textures/main/1%20(' + id + ').'+ext;
  }

  const parseCat = (raw) => {
    if (!raw) return {raw:"РАЗНОЕ",pri:"РАЗНОЕ"};
    let s = raw.trim();
    for (let [t,f] of Object.entries(CONFIG.FIXES)) s = s.replace(new RegExp(t,'gi'), f);
    s = s.replace(/[\|\s]+/g,',').replace(/,\s*,/g,',').trim();
    let p = s.split(',')[0].trim();
    if (!CONFIG.CATS.includes(p)) p = CONFIG.CATS.find(c => p.includes(c) || c.includes(p)) || "РАЗНОЕ";
    return {raw: s, pri: p};
  };

  const container = document.getElementById('archive-container');
  let scene, camera, renderer, controls, group;
  const meshes = [];

  // Инициализация сцены
  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(CONFIG.BG);
    scene.fog = new THREE.Fog(CONFIG.BG, 30, 120);

    camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, CONFIG.CAM_Z);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Ограничиваем пиксели для производительности
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    group = new THREE.Group();
    scene.add(group);

    // Свет
    const light = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(light);

    // Создаем меш-плейсхолдер (серый квадрат)
    const placeholderGeo = new THREE.PlaneGeometry(CONFIG.TEX_SIZE, CONFIG.TEX_SIZE);
    const placeholderMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
    
    // Создаем все объекты сразу, но с серым цветом
    RAW_DATA.forEach((d, idx) => {
      const mesh = new THREE.Mesh(placeholderGeo, placeholderMat.clone());
      // Рандомная позиция
      mesh.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*15, (Math.random()-0.5)*30);
      
      // Данные
      const p = parseCat(d.c);
      mesh.userData = { id: d.i, data: d, parsed: p, originalPos: mesh.position.clone() };
      group.add(mesh);
      meshes.push(mesh);
    });

    window.addEventListener('resize', onResize);
    animate();

    // ЗАПУСК ЗАГРУЗКИ ТЕКСТУР В ФОНЕ
    loadTexturesAsync();
  }

  // Загрузка текстур по одной, чтобы не убить браузер
  function loadTexturesAsync() {
    let idx = 0;
    const total = meshes.length;
    const loader = new THREE.TextureLoader();

    function loadNext() {
      if (idx >= total) return;

      const mesh = meshes[idx];
      const url = getTexUrl(mesh.userData.id);

      // Пробуем загрузить
      loader.load(url, 
        function(tex) {
          // Успех
          tex.colorSpace = THREE.SRGBColorSpace; // Для r128 может не работать, но не ломает
          mesh.material.map = tex;
          mesh.material.color.set(0xffffff); // Убираем серый оттенок
          mesh.material.needsUpdate = true;

          // Подгоняем размер под пропорции картинки (если они правильные)
          const img = tex.image;
          if(img && img.width && img.height) {
             const aspect = img.width / img.height;
             mesh.scale.set(aspect, 1, 1);
          } else {
             mesh.scale.set(1, 1, 1);
          }

          idx++;
          setTimeout(loadNext, 50); // Задержка 50мс между картинками
        },
        undefined,
        function(err) {
          // Ошибка 404
          console.warn('Не удалось загрузить ' + url);
          idx++;
          setTimeout(loadNext, 50); // Все равно идем дальше
        }
      );
    }
    loadNext();
  }

  function onResize() {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    group.rotation.y += 0.001;
    renderer.render(scene, camera);
  }

  // Ждем загрузки DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
